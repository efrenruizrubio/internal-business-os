services:
  postgres:
    image: postgres:17-alpine
    container_name: internal-business-os-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: internal_business_os
      POSTGRES_PASSWORD: internal_business_os_password
      POSTGRES_DB: internal_business_os
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
